<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | Celestate</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="navbar">
    <h1>Celestate</h1>

    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#listings">Listings</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h2>Login to Celestate</h2>

      <p class="auth-subtitle">
        Access your saved listings and manage your properties.
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label for="emailInput">Email</label>
          <input
            type="email"
            id="emailInput"
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="form-group">
          <label for="passwordInput">Password</label>
          <input
            type="password"
            id="passwordInput"
            placeholder="Enter your password"
            required
          >
        </div>

        <p id="loginMessage" class="form-message"></p>

        <button type="submit" class="auth-button">
          Login
        </button>
      </form>

      <p class="demo-login">
        Demo account: <strong>demo@celestate.com</strong> / <strong>123456</strong>
      </p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
